name: CI

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests (stdlib-only foundation)
        run: |
          python -m unittest tests.test_atomic_output -v
          python -m unittest tests.test_raster_io -v
          python -m unittest tests.test_gdal_outcome -v
          python -m unittest tests.test_raster_grid_contract -v
          python -m unittest tests.test_cost_models -v
          python -m unittest tests.test_network_metrics -v
          python -m unittest tests.test_align_export_qgis -v
          python -m unittest tests.test_release_identity -v
          python -m unittest tests.test_ui_assets -v

      - name: Unit tests (numpy-backed analysis cores)
        run: |
          python -m pip install --upgrade numpy
          python -m unittest tests.test_ahp_core -v
          python -m unittest tests.test_terrain_math -v

      - name: Release identity
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tag_date="$(git for-each-ref --format='%(taggerdate:short)' "refs/tags/${GITHUB_REF_NAME}")"
            if [[ -z "${tag_date}" ]]; then
              tag_date="$(git show -s --format=%cs "${GITHUB_REF_NAME}^{commit}")"
            fi
            python scripts/check_release_identity.py \
              --release-tag "${GITHUB_REF_NAME}" \
              --release-date "${tag_date}"
          else
            python scripts/check_release_identity.py
          fi

      - name: Install linters
        run: python -m pip install --upgrade flake8 pyflakes

      # Blocking set: syntax errors (E9) and undefined names (F82).
      # This is exactly what would have caught the missing helper module.
      - name: flake8 (blocking - syntax + undefined names)
        run: flake8 --select=E9,F63,F7,F82 --show-source .

      # Non-blocking: surfaces pre-existing style debt without failing the build.
      - name: flake8 (full project config, informational)
        continue-on-error: true
        run: flake8 .

      - name: Static smoke test
        run: python tests/check_static.py
